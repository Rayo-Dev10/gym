<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Horario Gimnasio IES CINOC - B-2025</title>
  <style>
body {
  background-color: #e6ecf3;
  font-family: 'Segoe UI', sans-serif;
  margin: 0;
  padding: 40px;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.table-container {
  position: relative;
  width: 100%;
  max-width: 800px;
  background-color: rgba(255, 255, 255, 0.95);
  border-radius: 20px;
  overflow: hidden;
  z-index: 1;
  box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
}

.table-container::before {
  content: "";
  position: absolute;
  top: -7.5%;
  left: -7.5%;
  width: 115%;
  height: 115%;
  background: linear-gradient(135deg, #ffffff, #dbe2ec, #c9d8f0);
  z-index: -1;
  border-radius: 24px;
  filter: blur(6px);
}

.title {
  text-align: center;
  margin: 20px 0 10px;
  font-size: 1.6rem;
  font-weight: 600;
  color: #2c3e50;
}

table {
  width: 100%;
  border-collapse: collapse;
}

thead {
  background-color: #2c3e50;
  color: white;
}

thead th {
  padding: 16px;
  text-align: center;
  font-size: 1rem;
}

tbody td {
  text-align: center;
  padding: 14px;
  font-size: 0.95rem;
  color: #333;
  border: 1px solid #dee5ef;
}

tbody tr:nth-child(even) {
  background-color: #f7f9fb;
}

tbody tr:nth-child(odd) {
  background-color: #ffffff;
}

.no-servicio {
  background-color: #f0f0f0;
  color: #777;
  font-style: italic;
}

@media (max-width: 600px) {
  thead th, tbody td {
    font-size: 0.75rem;
    padding: 8px;
  }

  .title {
    font-size: 1.2rem;
  }
}
  </style>
</head>
<body>
  <div class="table-container">
    <div class="title"></div>
    <table>
      <thead>
        <tr>
          <th>Hora</th>
          <th>Lunes</th>
          <th>Martes</th>
          <th>Miércoles</th>
          <th>Jueves</th>
          <th>Viernes</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <script id="horario-data" type="application/json">
{
  "title": "HORARIO GIMNASIO 2025 - ESTUDIANTES B-2025",
  "schedule": [
    {
      "time": "6:30 am",
      "lunes": "Disponible",
      "martes": "Disponible",
      "miercoles": "Disponible",
      "jueves": "Disponible",
      "viernes": "Disponible"
    },
    {
      "time": "7:30 am",
      "lunes": "No hay servicio",
      "martes": "No hay servicio",
      "miercoles": "No hay servicio",
      "jueves": "No hay servicio",
      "viernes": "No hay servicio"
    },
    {
      "time": "8:15 am",
      "lunes": "Disponible",
      "martes": "Disponible",
      "miercoles": "Disponible",
      "jueves": "Disponible",
      "viernes": "Disponible"
    },
    {
      "time": "9:15 am",
      "lunes": "Disponible",
      "martes": "Disponible",
      "miercoles": "Disponible",
      "jueves": "Disponible",
      "viernes": "Disponible"
    },
    {
      "time": "10:00 am",
      "lunes": "Disponible",
      "martes": "Disponible",
      "miercoles": "Disponible",
      "jueves": "Disponible",
      "viernes": "Disponible"
    },
    {
      "time": "11:00 am",
      "lunes": "Disponible",
      "martes": "Disponible",
      "miercoles": "Disponible",
      "jueves": "Disponible",
      "viernes": "—"
    },
    {
      "time": "12:00 m",
      "lunes": "Disponible",
      "martes": "Disponible",
      "miercoles": "Disponible",
      "jueves": "Disponible",
      "viernes": "—"
    },
    {
      "time": "5:00 pm",
      "lunes": "—",
      "martes": "—",
      "miercoles": "—",
      "jueves": "—",
      "viernes": "Disponible"
    },
    {
      "time": "6:00 pm",
      "lunes": "Disponible",
      "martes": "Disponible",
      "miercoles": "Disponible",
      "jueves": "Disponible",
      "viernes": "Disponible"
    },
    {
      "time": "7:00 pm",
      "lunes": "Disponible",
      "martes": "Disponible",
      "miercoles": "Disponible",
      "jueves": "Disponible",
      "viernes": "—"
    }
  ]
}
  </script>
  <script>
    const data = JSON.parse(document.getElementById('horario-data').textContent);
    document.querySelector('.title').textContent = data.title;
    const tbody = document.querySelector('tbody');
    const order = ['time', 'lunes', 'martes', 'miercoles', 'jueves', 'viernes'];
    data.schedule.forEach(entry => {
      const tr = document.createElement('tr');
      order.forEach(key => {
        const td = document.createElement('td');
        td.textContent = entry[key];
        if (td.textContent === 'No hay servicio' || td.textContent === '—') {
          td.classList.add('no-servicio');
        }
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });
  </script>
</body>
</html>
